name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    # The Vite SPA lives under web/ (the data layer / repo root carries only meta
    # files). Every job runs there.
    working-directory: web

jobs:
  lockfile-transport:
    # Recurrence guard for the #78 bug class: `npm install` (npm 11.x /
    # hosted-git-info) silently rewrites @jeswr github: deps to the SSH git transport,
    # which breaks `npm ci` in CI / Vercel without an SSH key. stdlib-only, no install.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run check:lockfile-transport

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # APP_ORIGIN is set at DEPLOY (not build); CI just proves the build is green +
      # gen-clientid / gen-catalog run and emit their artifacts into dist.
      - run: npm run build
