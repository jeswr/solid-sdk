<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pod Chat</title>
    <meta name="description" content="Read and post the chat rooms and messages in your Solid pod." />
    <!--
      No-flash theme script — sets the `.dark` class on <html> BEFORE first paint
      so a dark-preference reload never flashes light. It is the exact output of
      @jeswr/app-shell's themeScript() with the DEFAULT storageKey ("app-shell-theme")
      and attributeClass ("dark"), which MUST match the <ThemeProvider> in main.tsx.
      Inlined (not imported) because it must run synchronously in <head>, before the
      module bundle loads. AUTHORED-BY Claude Opus 4.8.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("app-shell-theme");
          var d =
            t === "dark" ||
            ((t === null || t === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var r = document.documentElement;
          r.classList.toggle("dark", d);
          r.style.colorScheme = d ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
