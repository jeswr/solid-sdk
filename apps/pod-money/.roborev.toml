# roborev config for pod-money — copied from the prod-solid-server suite shape.
# codex (a non-Anthropic model) reviews every commit; never reviewed only by the
# model family that wrote it.

agent = "codex"
model = "gpt-5.5"

review_min_severity = "low"

reuse_review_session = true
reuse_review_session_lookback = 5
