# roborev config — solid-app-suite convention (copied from prod-solid-server).
# Reviews every commit via codex (a non-Anthropic model) so AI-authored code is
# never reviewed only by the model family that wrote it.

agent = "codex"
model = "gpt-5.5"

review_min_severity = "low"

reuse_review_session = true
reuse_review_session_lookback = 5
