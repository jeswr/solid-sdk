# AUTHORED-BY Claude Fable 5
# The workspace gate. NOTE: GitHub Actions is currently account-billing-blocked for this
# estate — until restored, the same gate runs LOCALLY (`pnpm run gate`) before every push,
# per the suite discipline. This workflow arms automatically when billing returns.
name: gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff-aware --affected needs history
      # turbo --affected reads GITHUB_BASE_REF ("main") on pull_request events, but a
      # PR checkout has no local `main` ref (only origin/main + the merge ref), so base
      # resolution fails and turbo falls back to running EVERY task. Pin the documented
      # TURBO_SCM_BASE override to the PR's base SHA — always resolvable under
      # fetch-depth: 0. Push builds on main intentionally keep the full run.
      - name: Resolve --affected base (pull requests)
        if: github.event_name == 'pull_request'
        run: echo "TURBO_SCM_BASE=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run gate

  synthetic-rdf-golden:
    name: synthetic-rdf golden (${{ matrix.os }}, Node ${{ matrix.node }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [24, 26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter=@jeswr/synthetic-rdf
      - run: pnpm --filter @jeswr/synthetic-rdf test
