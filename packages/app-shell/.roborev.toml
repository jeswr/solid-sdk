# roborev config — repo-local.
# Mirrors prod-solid-server's .roborev.toml so the post-commit hook actually
# reviews here (the global default_agent is broken; pin agent+model per-repo).

agent = "codex"
model = "gpt-5.5"

review_min_severity = "low"

reuse_review_session = true
reuse_review_session_lookback = 5
