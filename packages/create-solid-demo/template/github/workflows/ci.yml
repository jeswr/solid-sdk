# CI gate for the __CSD_TITLE__ walkthrough.
#
# NOTE: until the @jeswr framework packages are published to npm, `pnpm install`
# here needs the pnpm.overrides tarball/git pins described in docs/deploy.md
# § Framework dependency status.
name: gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm lint:iris
      - run: pnpm check:insignia
