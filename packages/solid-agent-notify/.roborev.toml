# roborev config — codex (non-Anthropic) reviewer so code is never reviewed only
# by the model family that wrote it. Security-critical package (every send/read
# fetches attacker-influenced URLs) → review at the lowest severity.
agent = "codex"
model = "gpt-5.5"
review_min_severity = "low"
reuse_review_session = true
reuse_review_session_lookback = 5
